name: Update OpenTelemetry eBPF instrumentation chart version

pipelineid: opentelemetry-ebpf-instrumentation/version

sources:
  obi:
    name: Get latest opentelemetry-ebpf-instrumentation chart version
    kind: helmchart
    spec:
      url: https://open-telemetry.github.io/opentelemetry-helm-charts
      name: opentelemetry-ebpf-instrumentation
      versionfilter:
        kind: semver
        pattern: "*"

conditions:
  obi-changed:
    name: Skip when opentelemetry-ebpf-instrumentation is already up to date
    kind: shell
    scmid: default
    disablesourceinput: true
    spec:
      command: |
        # Extract the dependency version currently pinned in Chart.yaml
        # (4-space indented "version:" line belongs to the dependency, quotes stripped).
        current=$(sed -n 's/^    version: *"\?\([0-9][^"]*\)"\?$/\1/p' charts/network-enforcer/Chart.yaml | head -n1)
        # Exit 0 (proceed with the update) only when the chart is NOT yet at the source version;
        # exit 1 (skip the pipeline gracefully) when already up to date or the value could not be read.
        [ -n "$current" ] && [ "$current" != "{{ source "obi" }}" ]

targets:
  obi-dependency-update:
    name: 'deps(obi): update opentelemetry-ebpf-instrumentation to {{ source "obi" }}'
    kind: shell
    scmid: default
    disablesourceinput: true
    spec:
      command: >
        version='{{ source "obi" }}' &&
        chart_dir='charts/network-enforcer' &&
        sed -i 's/^    version: .*/    version: "'"$version"'"/' "${chart_dir}/Chart.yaml" &&
        helm dependency update "${chart_dir}" &&
        git add -A
      environments:
        - name: PATH
        - name: HOME

actions:
  default:
    title: 'deps(obi): update opentelemetry-ebpf-instrumentation to {{ source "obi" }}'
    kind: github/pullrequest
    scmid: default
    spec:
      mergemethod: squash
      description: |
        Automatic opentelemetry-ebpf-instrumentation Helm chart {{ source "obi" }} update.
        This PR has been created by the automation used to automatically update the opentelemetry-ebpf-instrumentation dependency version in the network-enforcer Helm chart.
        REMEMBER IF YOU WANT TO MERGE IN A SINGLE COMMIT CHANGES AND VERSION BUMP, YOU MUST SQUASH THE COMMIT BEFORE MERGING THIS PR!
      draft: false
      labels:
        - "chore"
        - "dependencies"

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.author }}"
      email: "{{ .github.email }}"
      owner: "{{ requiredEnv .github.owner }}"
      repository: "network-enforcer"
      token: "{{ requiredEnv .github.token }}"
      username: "{{ requiredEnv .github.user }}"
      branch: "{{ .github.branch }}"
      commitusingapi: true
      commitmessage:
        type: "chore"
        scope: deps
        title: "update opentelemetry-ebpf-instrumentation chart version"
        hidecredit: true
        footers: "Signed-off-by: NetworkEnforcer bot <network-enforcer-bot@users.noreply.github.com>"
