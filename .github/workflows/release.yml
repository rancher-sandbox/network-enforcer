name: Create a new release for NetworkEnforcer stack

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    strategy:
      matrix:
        component: [controller, cniwatcher]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
      id-token: write
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build image
        uses: rancher-sandbox/runtime-enforcer/.github/actions/container-build@18246f86507092af70ebf87f273adc278cd42c5c
        with:
          arch: ${{ matrix.arch }}
          dockerfile: package/Dockerfile.${{ matrix.component }}
          image: ${{ matrix.component }}
          repo: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  merge:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        component: [controller, cniwatcher]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Merge images
        uses: rancher-sandbox/runtime-enforcer/.github/actions/merge-multiarch@d3dbdc129a21016d114bc3bdae6eb47491c0db25
        with:
          arch: amd64,arm64
          image: ${{ matrix.component }}
          repo: ${{ github.repository }}
          tag: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  attest:
    name: Sign attestations and upload as artifacts
    strategy:
      matrix:
        component: [controller, cniwatcher]
        arch: [amd64, arm64]
    needs: [merge]
    permissions:
      contents: read
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Attestation
        uses: rancher-sandbox/runtime-enforcer/.github/actions/attestation@d3dbdc129a21016d114bc3bdae6eb47491c0db25
        with:
          arch: ${{ matrix.arch }}
          image: ${{ matrix.component }}
          repo: ${{ github.repository }}
          artifact_prefix: NetworkEnforcer-
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    needs: [attest]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Retrieve tag name
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo "TAG_NAME=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
      - name: Get release ID from the release created by release drafter
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            let releases = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
            });
            for (const release of releases.data) {
              if (release.draft) {
                      core.info(release)
                      core.exportVariable('RELEASE_ID', release.id)
                      return
              }
            }
            core.setFailed(`Draft release not found`)
      - name: Download attestation artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: attestation-NetworkEnforcer-*
          merge-multiple: true
      - name: Display structure of downloaded files
        run: ls -R
      - name: Upload release assets
        id: upload_release_assets
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            let fs = require('fs');
            let path = require('path');
            let files = [
                'NetworkEnforcer-controller-attestation-amd64-provenance.intoto.jsonl',
                'NetworkEnforcer-controller-attestation-amd64-provenance.intoto.jsonl.bundle.sigstore',
                'NetworkEnforcer-controller-attestation-amd64-sbom.json',
                'NetworkEnforcer-controller-attestation-amd64-sbom.json.bundle.sigstore',
                'NetworkEnforcer-controller-attestation-arm64-provenance.intoto.jsonl',
                'NetworkEnforcer-controller-attestation-arm64-provenance.intoto.jsonl.bundle.sigstore',
                'NetworkEnforcer-controller-attestation-arm64-sbom.json',
                'NetworkEnforcer-controller-attestation-arm64-sbom.json.bundle.sigstore',
                'NetworkEnforcer-cniwatcher-attestation-amd64-provenance.intoto.jsonl',
                'NetworkEnforcer-cniwatcher-attestation-amd64-provenance.intoto.jsonl.bundle.sigstore',
                'NetworkEnforcer-cniwatcher-attestation-amd64-sbom.json',
                'NetworkEnforcer-cniwatcher-attestation-amd64-sbom.json.bundle.sigstore',
                'NetworkEnforcer-cniwatcher-attestation-arm64-provenance.intoto.jsonl',
                'NetworkEnforcer-cniwatcher-attestation-arm64-provenance.intoto.jsonl.bundle.sigstore',
                'NetworkEnforcer-cniwatcher-attestation-arm64-sbom.json',
                'NetworkEnforcer-cniwatcher-attestation-arm64-sbom.json.bundle.sigstore',
                ]
            const {RELEASE_ID} = process.env
            for (const file of files) {
              let file_data = fs.readFileSync(file);
              let response = await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: `${RELEASE_ID}`,
                name: path.basename(file),
                data: file_data,
              });
            }
      - name: Publish release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const {RELEASE_ID} = process.env
            const {TAG_NAME} = process.env
            isPreRelease = ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: `${RELEASE_ID}`,
              draft: false,
              tag_name: `${TAG_NAME}`,
              name: `NetworkEnforcer ${TAG_NAME}`,
              prerelease: isPreRelease,
              make_latest: !isPreRelease
            });

  update-charts:
    needs: [create-release]
    uses: ./.github/workflows/update-charts.yml
    permissions:
      contents: write
      pull-requests: write
