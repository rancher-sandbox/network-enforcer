apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "network-enforcer.fullname" . }}-controller-manager
  labels:
    control-plane: controller-manager
  {{- include "network-enforcer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: controller
    {{- include "network-enforcer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: controller
      {{- include "network-enforcer.selectorLabels" . | nindent 8 }}
      {{- with .Values.controller.podLabels }}
      {{- toYaml . | nindent 8 }}
      {{- end }}
      annotations:
        kubectl.kubernetes.io/default-container: manager
      {{- with .Values.controller.podAnnotations }}
      {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
      - args:
        {{- toYaml .Values.controller.args | nindent 8 }}
        - --drain-flows-interval={{ .Values.controller.drainFlowsInterval }}
        - --cniwatcher-tls-cert-dir={{ include "network-enforcer.cniwatcher.certDir" . }}
        command:
        - /controller
        env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        {{- with .Values.otel }}
        {{- if .endpoint }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ quote .endpoint }}
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: {{ quote .protocol }}
        {{- if .caCert }}
        - name: OTEL_EXPORTER_OTLP_CERTIFICATE
          value: {{ quote .caCert }}
        {{- end }}
        {{- if .clientCert }}
        - name: OTEL_EXPORTER_OTLP_CLIENT_CERTIFICATE
          value: {{ quote .clientCert }}
        {{- end }}
        {{- if .clientKey }}
        - name: OTEL_EXPORTER_OTLP_CLIENT_KEY
          value: {{ quote .clientKey }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- with .Values.controller.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        image: {{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
        name: manager
        ports:
        - containerPort: 4317
          name: otlp-grpc
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources: {{- toYaml .Values.controller.resources | nindent 10 }}
        securityContext: {{- toYaml .Values.controller.containerSecurityContext
          | nindent 10 }}
        volumeMounts:
        - name: cniwatcher-mtls-certs
          mountPath: {{ include "network-enforcer.cniwatcher.certDir" . }}
          readOnly: true
      volumes:
      - name: cniwatcher-mtls-certs
        csi:
          driver: "csi.cert-manager.io"
          readOnly: true
          volumeAttributes:
            csi.cert-manager.io/issuer-name: {{ include "network-enforcer.caIssuerName" . }}
            csi.cert-manager.io/issuer-kind: Issuer
            csi.cert-manager.io/dns-names: {{ include "network-enforcer.fullname" . }}-controller-manager.{{ .Release.Namespace }}.svc,{{ include "network-enforcer.fullname" . }}-otlp,{{ include "network-enforcer.controller.otlpServiceDNS" . }}
      securityContext: {{- toYaml .Values.controller.podSecurityContext | nindent
        8 }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "network-enforcer.fullname" . }}-controller-manager
      terminationGracePeriodSeconds: 10
