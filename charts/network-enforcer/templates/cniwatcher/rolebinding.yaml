{{- if .Values.cniwatcher.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "network-enforcer.fullname" . }}-cniwatcher
  labels:
    {{- include "network-enforcer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "network-enforcer.fullname" . }}-cniwatcher
subjects:
- kind: ServiceAccount
  name: {{ include "network-enforcer.fullname" . }}-cniwatcher
  namespace: {{ include "network-enforcer.cniwatcher.namespace" . }}
{{- end }}
