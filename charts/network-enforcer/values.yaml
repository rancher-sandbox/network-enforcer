controller:
  args:
  - --metrics-bind-address=:8443
  - --leader-elect
  - --health-probe-bind-address=:8081
  env: []
  containerSecurityContext:
    runAsUser: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
  image:
    repository: ghcr.io/rancher-sandbox/network-enforcer/controller
    tag: v0.1.0
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 500m
      memory: 512Mi
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  replicas: 1
  serviceAccount:
    annotations: {}
  tolerations: []
  podLabels: {}
  podAnnotations: {}
  nodeSelector: {}
  affinity: {}
  drainFlowsInterval: 30s

kubernetesClusterDomain: cluster.local
imagePullSecrets: []

# The original dependency name is needed for Helm v4 dependency processing.
# @schema additionalProperties:true
opentelemetry-ebpf-instrumentation: {}

# Settings for opentelemetry-ebpf-instrumentation
# @schema additionalProperties:true
obi:
  enabled: true
  preset: network
  # opentelemetry-ebpf-instrumentation config
  # @schema additionalProperties:true
  config:
    # opentelemetry-ebpf-instrumentation config data block
    # @schema additionalProperties:true
    data:
      otel_metrics_export:
        # https scheme + protocol: grpc -> OBI uses otlpmetricgrpc.New() which
        # honours the standard OTEL env-based TLS autoconfig.
        endpoint: https://network-enforcer-otlp:4317
        protocol: grpc
        interval: 30s
      otel_traces_export:
        # NOTE: Traces stay disabled because OBI's trace path uses the Collector
        # exporters (otlphttpexporter/otlpexporter) with configtls.ClientConfig
        # fields left unset, so env-based client certs are ignored there; requires
        # an upstream OBI fix.
        endpoint: ""
      attributes:
        kubernetes:
          enable: true
        select:
          obi_network_flow_bytes:
            include: ["*"]
      metrics:
        features:
          - network

  # mTLS is mandatory-on for OBI: certificates are issued per-pod by cert-manager
  # via the CSI driver (csi.cert-manager.io). The metrics OTLP exporter uses the
  # standard OTEL env vars for client-cert authentication.
  env:
    OTEL_EXPORTER_OTLP_METRICS_CERTIFICATE: /etc/network-enforcer/certs/ca.crt
    OTEL_EXPORTER_OTLP_METRICS_CLIENT_CERTIFICATE: /etc/network-enforcer/certs/tls.crt
    OTEL_EXPORTER_OTLP_METRICS_CLIENT_KEY: /etc/network-enforcer/certs/tls.key

  volumeMounts:
    - name: obi-mtls-certs
      mountPath: /etc/network-enforcer/certs
      readOnly: true

  volumes:
    - name: obi-mtls-certs
      csi:
        driver: csi.cert-manager.io
        readOnly: true
        volumeAttributes:
          csi.cert-manager.io/issuer-name: network-enforcer-ca
          csi.cert-manager.io/issuer-kind: Issuer
          csi.cert-manager.io/dns-names: ${POD_NAME}.${POD_NAMESPACE}

# Shared OTLP configuration used by all components.
otel:
  # OTLP endpoint (host:port). Empty disables OTLP.
  endpoint: ""
  # Protocol: "grpc" or "http/protobuf".
  protocol: grpc
  # Path to the CA certificate for verifying the collector's TLS cert.
  # Empty means insecure.
  caCert: ""
  # Path to the client TLS certificate and key for mTLS with the collector.
  # Both must be set to enable client cert auth.
  clientCert: ""
  clientKey: ""

cniwatcher:
  enabled: true
  # Valid values: aws-vpc, calico, cilium, flannel
  cniType: calico
  # Port for the gRPC ScrapeViolations server. The controller scrapes violations
  # from each cniwatcher pod on this port.
  grpcPort: 50051
  # mTLS is always on: certificates are issued per-pod by cert-manager via the
  # CSI driver (csi.cert-manager.io), so both cert-manager and that driver must
  # be installed in the cluster.
  podSecurityContext:
    runAsNonRoot: true # this should be false for aws-vpc
    seccompProfile:
      type: RuntimeDefault
    # for flannel uncomment the following
    # fsGroup: 4
  image:
    repository: ghcr.io/rancher-sandbox/network-enforcer/cniwatcher
    tag: v0.1.0
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  containerSecurityContext:
    runAsUser: 1000 # If CNI type is aws-vpc it needs to be 0.
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
  calico:
    goldmaneEndpoint: goldmane.calico-system.svc:7443
  cilium:
    hubbleEndpoint: unix:///var/run/cilium/hubble.sock
  serviceAccount:
    annotations: {}
